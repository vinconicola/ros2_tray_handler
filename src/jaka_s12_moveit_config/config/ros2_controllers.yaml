controller_manager:
  ros__parameters:
    update_rate: 100

    jaka_s12_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    
    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

jaka_s12_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 1.0
      joint_1: { goal: 0.005 }
      joint_2: { goal: 0.005 }
      joint_3: { goal: 0.005 }
      joint_4: { goal: 0.005 }
      joint_5: { goal: 0.005 }
      joint_6: { goal: 0.005 }
    gains:
      joint_1: { p: 100.0, i: 0.01, d: 10.0, i_clamp: 1.0 }
      joint_2: { p: 100.0, i: 0.01, d: 10.0, i_clamp: 1.0 }
      joint_3: { p: 100.0, i: 0.01, d: 10.0, i_clamp: 1.0 }
      joint_4: { p: 100.0, i: 0.01, d: 10.0, i_clamp: 1.0 }
      joint_5: { p: 100.0, i: 0.01, d: 10.0, i_clamp: 1.0 }
      joint_6: { p: 100.0, i: 0.01, d: 10.0, i_clamp: 1.0 }

gripper_controller:
  ros__parameters:
    joints:
      - joint_7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
